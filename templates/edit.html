
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Survey</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f5;
    font-family:'Segoe UI',sans-serif;
}

.navbar{
    background:#2e5939;
}

.logo{
    width:150px;
}

.main-card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.section-title{
    color:#2e5939;
    border-bottom:2px solid #ddd;
    padding-bottom:10px;
    margin-bottom:20px;
}

.btn-update{
    background:#2e5939;
    color:white;
    border:none;
}

.btn-update:hover{
    background:#1d3f27;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
Marange Bocha Heritage
</a>

<div class="navbar-nav ms-auto">

<a class="nav-link" href="/">
Add Survey
</a>

<a class="nav-link" href="/surveys">
View Surveys
</a>

</div>

</div>

</nav>

<div class="container mt-4">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<h2 class="mt-3">
Edit Survey Record
</h2>

<p>
Update participant information and expenses
</p>

</div>

<div class="main-card">

<form action="/update/{{ survey._id }}" method="POST">

<h4 class="section-title">
Participant Information
</h4>

<div class="row">

<div class="col-md-4">

<label>Age</label>

<input type="number"
       class="form-control"
       name="age"
       value="{{ survey.age }}"
       required>

</div>

<div class="col-md-4">

<label>Gender</label>

<select class="form-select"
        name="gender"
        required>

<option value="Male"
{% if survey.gender == 'Male' %}
selected
{% endif %}>
Male
</option>

<option value="Female"
{% if survey.gender == 'Female' %}
selected
{% endif %}>
Female
</option>

</select>

</div>

<div class="col-md-4">

<label>Monthly Income</label>

<input type="number"
       class="form-control"
       name="income"
       value="{{ survey.income }}"
       required>

</div>

</div>

<h4 class="section-title mt-4">
Monthly Expenses
</h4>

<div class="row mb-3">

<div class="col-md-4">
Utilities
</div>

<div class="col-md-8">

<input type="number"
       class="form-control"
       name="utilities_amount"
       value="{{ survey.utilities }}">

</div>

</div>

<div class="row mb-3">

<div class="col-md-4">
Entertainment
</div>

<div class="col-md-8">

<input type="number"
       class="form-control"
       name="entertainment_amount"
       value="{{ survey.entertainment }}">

</div>

</div>

<div class="row mb-3">

<div class="col-md-4">
School Fees
</div>

<div class="col-md-8">

<input type="number"
       class="form-control"
       name="schoolfees_amount"
       value="{{ survey.schoolfees }}">

</div>

</div>

<div class="row mb-3">

<div class="col-md-4">
Shopping
</div>

<div class="col-md-8">

<input type="number"
       class="form-control"
       name="shopping_amount"
       value="{{ survey.shopping }}">

</div>

</div>

<div class="row mb-3">

<div class="col-md-4">
Healthcare
</div>

<div class="col-md-8">

<input type="number"
       class="form-control"
       name="healthcare_amount"
       value="{{ survey.healthcare }}">

</div>

</div>

<div class="text-center mt-4">

<button type="submit"
        class="btn btn-update btn-lg">

💾 Update Survey

</button>

<a href="/surveys"
   class="btn btn-secondary btn-lg">

Cancel

</a>

</div>

</form>

</div>

</div>

<footer>

Marange Bocha Heritage © 2026
<br>
A Legacy Preserved, A Future Shaped

</footer>

</body>
</html>
